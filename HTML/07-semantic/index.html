<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>07-Semantic Tag in HTML</title>
  </head>
  <body>
    <h1>Semantic Tag In HTML5</h1>

    <!-- Semantic tags describe the meaning of the content in HTML. -->

    <!-- ex: 
   nav,header,main,section,footer etc.. -->

    <!-- Non-semantic tags are not meaningful for the content. -->

    <!-- ex: div,span etc.. -->

    <header>
      <h1>These are semantic tags</h1>
      <nav>
        <a href="">Home</a>
        <a href="">About</a>
        <a href="">Contact</a>
      </nav>
    </header>
    <hr />
    <div>
      <a href="">Home</a>
      <a href="">About</a>
      <a href="">Contact</a>
    </div>

    <!-- 1. Better readability
2. Better SEO(Search Engine Optimization) 
3. Better readability for screen reader 
4. Clean and Organized code 
5. Easier to manager large code base  -->

    <!-- ARIA - Accessible Rich Internet Application -->

    <button>Submit</button>

    <button aria-label="close">Close</button>

    <button aria-level="Search">Search</button>

    
  </body>
</html>
