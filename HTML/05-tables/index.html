<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tables in HTML</title>
  </head>
  <body>
    <h1>Table In HTML</h1>
    <table border="2px">
        <caption>List of students in tabular format</caption>
      <thead>
        <tr>
            <th scope="row">Name</th>
            <th scope="row">Course</th>
            <th scope="row">Place</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="row">Raju</th>
          <td>MERN+AI Integration</td>
          <td>Bhubaneswar</td>
        </tr>
        <tr>
          <th scope="row">Raju</th>
          <td>MERN+AI Integration</td>
          <td>Bhubaneswar</td>
        </tr>
        <tr>
          <th scope="row">Raju</th>
          <td>MERN+AI Integration</td>
          <td>Bhubaneswar</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
    <th scope="row">Total Students </th>
        <td colspan="2">3</td>
      </tr>
      </tfoot>
    </table>
  </body>
</html>
